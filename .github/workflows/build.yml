name: Build & Deploy WAR to Lightsail (SSH)

on:
  push:
    branches: #[ "dev", "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  WAR_NAME: ROOT.war                    # 빌드 산출물 이름
  APP_DIR: /home/ec2-user/HCT           # APP 디렉토리
  DEPLOY_SH: deploy.sh                  # 배포 스크립트 이름


jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build WAR (Gradle)
        run: |
          chmod +x gradlew || true
          ./gradlew clean bootWar -x test
          cp $(ls build/libs/*.war | head -n 1) ${WAR_NAME}

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_KEY }}

      - name: Copy WAR to server
        run: |
          scp -o StrictHostKeyChecking=no ${WAR_NAME} \
              ec2-user@${{ secrets.DEV_HOST }}:/tmp/${WAR_NAME}

      - name: Deploy on server
        env:
          WAR_NAME: ${{ env.WAR_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
          DEPLOY_SH: ${{ env.DEPLOY_SH }}
        run: |
          ssh -T -o StrictHostKeyChecking=no ec2-user@${{ secrets.DEV_HOST }} \
          "APP_DIR='${{ env.APP_DIR }}' WAR_NAME='${{ env.WAR_NAME }}' DEPLOY_SH='${{ env.DEPLOY_SH }}' bash -s" << EOF
          set -euo pipefail
          
          mkdir -p "$APP_DIR" "$APP_DIR/logs" "$APP_DIR/warbak"
          
          cd "$APP_DIR"
          chmod +x "./$DEPLOY_SH"
          
          echo "[1/4] 애플리케이션 중지"
          ./"$DEPLOY_SH" stop || true
      
          echo "[2/4] 신규 WAR 배치"
          mv -f "/tmp/${WAR_NAME}" "$APP_DIR/ROOT.war"
      
          echo "[3/4] 애플리케이션 시작"
          ./"$DEPLOY_SH" start
      
          echo "[4/4] 상태 확인"
          ./"$DEPLOY_SH" status
          EOF

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build WAR (Gradle)
        run: |
          chmod +x gradlew || true
          ./gradlew clean bootWar -x test
          cp $(ls build/libs/*.war | head -n 1) ${WAR_NAME}

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Copy WAR to server
        run: |
          scp -o StrictHostKeyChecking=no ${WAR_NAME} \
              ec2-user@${{ secrets.PROD_HOST }}:/tmp/${WAR_NAME}

      - name: Deploy on server
        env:
          WAR_NAME: ${{ env.WAR_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
          DEPLOY_SH: deploy.sh
        run: |
          ssh -T -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_HOST }} \
          "APP_DIR='${{ env.APP_DIR }}' WAR_NAME='${{ env.WAR_NAME }}' DEPLOY_SH='${{ env.DEPLOY_SH }}' bash -s" << EOF
          set -euo pipefail
          
          mkdir -p "$APP_DIR" "$APP_DIR/logs" "$APP_DIR/warbak"
          
          cd "$APP_DIR"
          chmod +x "./$DEPLOY_SH"
          
          echo "[1/4] 애플리케이션 중지"
          ./"$DEPLOY_SH" stop || true
          
          echo "[2/4] 신규 WAR 배치"
          mv -f "/tmp/${WAR_NAME}" "$APP_DIR/ROOT.war"
          
          echo "[3/4] 애플리케이션 시작"
          ./"$DEPLOY_SH" start
          
          echo "[4/4] 상태 확인"
          ./"$DEPLOY_SH" status
          EOF