<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 80px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">사용자 로그인</h4>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">아이디 또는 비밀번호가 올바르지 않습니다.</div>
            <div th:if="${param.roleError}" class="alert alert-warning" role="alert">사용자 권한이 필요합니다.</div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">정상적으로 로그아웃되었습니다.</div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input id="username" name="username" type="text" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input id="password" name="password" type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">로그인</button>
            </form>

            <div class="text-center mt-3">
                <a href="/admin/login">관리자 로그인으로 이동</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
