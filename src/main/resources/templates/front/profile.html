<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 수정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #667eea; margin-bottom: 30px; font-size: 2em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #667eea; font-weight: bold; margin-bottom: 8px; }
        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        input:disabled { background-color: #f5f5f5; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4); }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
<div class="container">
    <h1>프로필 수정</h1>

    <div class="alert alert-success" th:if="${param.success}">
        프로필이 성공적으로 수정되었습니다.
    </div>

    <form th:action="@{/user/profile/update}" method="post" th:object="${user}">
        <div class="form-group">
            <label for="userId">아이디</label>
            <input type="text" id="userId" th:field="*{userId}" disabled>
        </div>
        <div class="form-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" th:field="*{userName}" required>
        </div>
        <div class="form-group">
            <label for="userEmail">이메일</label>
            <input type="email" id="userEmail" th:field="*{userEmail}" required>
        </div>
        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="text" id="phone" th:field="*{phone}">
        </div>
        <div class="form-group">
            <label for="userPwd">새 비밀번호 (변경 시에만 입력)</label>
            <input type="password" id="userPwd" name="userPwd" placeholder="변경하지 않으면 비워두세요">
        </div>
        <div class="form-group">
            <label for="memo">메모</label>
            <textarea id="memo" th:field="*{memo}" rows="3"></textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="/user/dashboard" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
