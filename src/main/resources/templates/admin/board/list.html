<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>게시판 관리</title>
</head>
<body>
<h1 layout:fragment="page-title">게시판 관리</h1>
<ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">홈</a></li>
    <li class="breadcrumb-item active">게시판</li>
</ol>

<div layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">게시판 목록</h3>
            <div class="card-tools">
                <a th:href="@{/admin/boards/create}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 게시판 등록</a>
            </div>
        </div>
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이름</th>
                    <th>표시명</th>
                    <th>게시 허용</th>
                    <th>첨부 허용</th>
                    <th>댓글 허용</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.boardId}">1</td>
                    <td th:text="${board.boardNm}">공지</td>
                    <td th:text="${board.boardViewNm}">공지사항</td>
                    <td><span th:class="${board.postYn ? 'badge badge-success' : 'badge badge-secondary'}"
                              th:text="${board.postYn ? '가능' : '불가'}">가능</span></td>
                    <td><span th:class="${board.fileYn ? 'badge badge-success' : 'badge badge-secondary'}"
                              th:text="${board.fileYn ? '가능' : '불가'}">가능</span></td>
                    <td><span th:class="${board.replyYn ? 'badge badge-success' : 'badge badge-secondary'}"
                              th:text="${board.replyYn ? '가능' : '불가'}">가능</span></td>
                    <td>
                        <a th:href="@{/admin/boards/{id}/edit(id=${board.boardId})}" class="btn btn-info btn-sm"><i class="fas fa-edit"></i></a>
                        <form th:action="@{/admin/boards/{id}/delete(id=${board.boardId})}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('이 게시판을 삭제하시겠습니까?')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(boards)}">
                    <td colspan="7" class="text-center text-muted py-4">등록된 게시판이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
