<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>메뉴 관리</title>
    <style>
        .menu-tree-root, .menu-children { list-style: none; margin: 0; padding-left: 0; }
        .menu-children { margin-top: 8px; margin-left: 24px; padding-left: 14px; border-left: 2px dashed #dee2e6; }
        .menu-item { margin-bottom: 8px; }
        .menu-node { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 10px 12px; }
        .menu-node.active { border-color: #007bff; box-shadow: 0 0 0 0.15rem rgba(0,123,255,.2); }
        .menu-node { cursor: move; }
        .menu-meta { color: #6c757d; font-size: .9rem; }
        .toggle-children { width: 22px; height: 22px; border: 0; background: transparent; color: #6c757d; margin-right: 4px; cursor: pointer; }
        .toggle-children.empty { visibility: hidden; pointer-events: none; }
        .split-pane { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
        @media (max-width: 1200px) { .split-pane { grid-template-columns: 1fr; } }
        .sticky-panel { position: sticky; top: 12px; }
    </style>
</head>
<body>
<h1 layout:fragment="page-title">메뉴 관리</h1>
<ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">홈</a></li>
    <li class="breadcrumb-item active">메뉴</li>
</ol>

<div layout:fragment="content">
    <div class="split-pane">
        <div class="card mb-0">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">메뉴 트리</h3>
                <div class="d-flex align-items-center" style="gap:8px;">
                    <a th:href="@{/admin/menus(lang='KR')}" class="btn btn-sm"
                       th:classappend="${lang == 'KR'} ? 'btn-primary' : 'btn-default'">KR</a>
                    <a th:href="@{/admin/menus(lang='EN')}" class="btn btn-sm"
                       th:classappend="${lang == 'EN'} ? 'btn-primary' : 'btn-default'">EN</a>
                    <a th:href="@{/admin/menus(lang='JP')}" class="btn btn-sm"
                       th:classappend="${lang == 'JP'} ? 'btn-primary' : 'btn-default'">JP</a>
                    <button id="expandAllBtn" type="button" class="btn btn-default btn-sm">전체 펼치기</button>
                    <button id="collapseAllBtn" type="button" class="btn btn-default btn-sm">전체 접기</button>
                    <button id="saveOrderBtn" type="button" class="btn btn-success btn-sm"><i class="fas fa-save"></i> 정렬 저장</button>
                </div>
            </div>
            <div class="card-body">
                <div th:if="${message}" class="alert alert-success alert-dismissible">
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                    <i class="icon fas fa-check"></i> <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible">
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                    <i class="icon fas fa-ban"></i> <span th:text="${error}"></span>
                </div>

                <div class="mb-2">
                    <button id="createNewBtn" type="button" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus"></i> 신규 메뉴
                    </button>
                </div>

                <div class="text-center text-muted py-5" th:if="${#lists.isEmpty(menuItems)}">등록된 메뉴가 없습니다.</div>
                <ul id="menuTreeRoot" class="menu-tree-root" th:if="${!#lists.isEmpty(menuItems)}"></ul>
            </div>
        </div>

        <div class="card mb-0 sticky-panel">
            <div class="card-header">
                <h3 id="formTitle" class="card-title mb-0" th:text="${editMode ? '메뉴 수정' : '메뉴 등록'}">메뉴 등록</h3>
            </div>
            <form id="menuForm"
                  th:action="${editMode and formMenu.menuId != null ? '/admin/menus/' + formMenu.menuId + '/edit' : '/admin/menus/create'}"
                  method="post">
                <div class="card-body">
                    <input type="hidden" id="menuId" th:value="${formMenu.menuId}" />
                    <input type="hidden" id="langType" name="langType" th:value="${lang}">

                    <div class="form-group">
                        <label for="menuNm">메뉴명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="menuNm" name="menuNm" required th:value="${formMenu.menuNm}">
                    </div>

                    <div class="form-group">
                        <label for="menuTitle">브라우저 타이틀</label>
                        <input type="text" class="form-control" id="menuTitle" name="menuTitle" th:value="${formMenu.menuTitle}">
                    </div>

                    <div class="form-group">
                        <label for="upperMenuId">상위 메뉴</label>
                        <select class="form-control" id="upperMenuId" name="upperMenuId">
                            <option value="ROOT" th:selected="${formMenu.upperMenuId == null or formMenu.upperMenuId == 'ROOT'}">최상위 메뉴</option>
                            <option th:each="parent : ${parentMenus}"
                                    th:if="${formMenu.menuId == null || parent.menuId != formMenu.menuId}"
                                    th:value="${parent.menuId}"
                                    th:selected="${parent.menuId.toString() == formMenu.upperMenuId}"
                                    th:text="${parent.menuNm + ' (' + parent.menuType + ')'}">상위 메뉴</option>
                        </select>
                        <small class="form-text text-muted">최대 3단계까지 계층 구성 가능합니다.</small>
                    </div>

                    <div class="form-group">
                        <label for="menuType">메뉴 타입</label>
                        <select class="form-control" id="menuType" name="menuType">
                            <option value="LINK" th:selected="${formMenu.menuType == 'LINK'}">페이지 링크</option>
                            <option value="BOARD" th:selected="${formMenu.menuType == 'BOARD'}">게시판 링크</option>
                            <option value="EXTERNAL" th:selected="${formMenu.menuType == 'EXTERNAL'}">외부 링크</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="url">URL</label>
                        <input type="text" class="form-control" id="url" name="url" th:value="${formMenu.url}" placeholder="/about 또는 https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="menuOrd">정렬 순서</label>
                        <input type="number" class="form-control" id="menuOrd" name="menuOrd" min="1" th:value="${formMenu.menuOrd}">
                    </div>

                    <div class="form-group">
                        <label for="menuDesc">메뉴 설명</label>
                        <textarea class="form-control" id="menuDesc" name="menuDesc" rows="3" th:text="${formMenu.menuDesc}"></textarea>
                    </div>

                    <div class="form-group mb-0">
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="openYn" name="openYn" th:checked="${formMenu.openYn == null || formMenu.openYn}">
                            <label class="custom-control-label" for="openYn">노출(공개)</label>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 저장</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-default"><i class="fas fa-times"></i> 신규로 전환</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="/webjars/sortablejs/1.15.6/Sortable.min.js"></script>
    <script th:inline="javascript">
        (function () {
            const lang = [[${#strings.escapeJavaScript(lang)}]];
            const csrfToken = [[${#strings.escapeJavaScript(_csrf.token)}]];
            const csrfHeader = [[${#strings.escapeJavaScript(_csrf.headerName)}]];
            const csrfParam = [[${#strings.escapeJavaScript(_csrf.parameterName)}]];
            const menus = [[${menuItems}]];
            const rootEl = document.getElementById('menuTreeRoot');
            const saveBtn = document.getElementById('saveOrderBtn');
            const expandAllBtn = document.getElementById('expandAllBtn');
            const collapseAllBtn = document.getElementById('collapseAllBtn');
            const createNewBtn = document.getElementById('createNewBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const menuForm = document.getElementById('menuForm');
            const formTitle = document.getElementById('formTitle');
            const MAX_DEPTH = 3;

            if (!rootEl || !saveBtn || !menuForm) return;

            const formFields = {
                menuId: document.getElementById('menuId'),
                langType: document.getElementById('langType'),
                menuNm: document.getElementById('menuNm'),
                menuTitle: document.getElementById('menuTitle'),
                upperMenuId: document.getElementById('upperMenuId'),
                menuType: document.getElementById('menuType'),
                url: document.getElementById('url'),
                menuOrd: document.getElementById('menuOrd'),
                menuDesc: document.getElementById('menuDesc'),
                openYn: document.getElementById('openYn')
            };

            const menuMap = new Map();
            (menus || []).forEach(m => menuMap.set(Number(m.menuId), m));
            let activeMenuId = formFields.menuId.value ? Number(formFields.menuId.value) : null;

            function normalizeParentId(upperMenuId) {
                if (!upperMenuId || upperMenuId === 'ROOT') return null;
                const v = Number(upperMenuId);
                return Number.isNaN(v) ? null : v;
            }

            function buildTree(items) {
                const map = new Map();
                const roots = [];
                items.forEach(item => map.set(item.menuId, {...item, children: []}));
                items.forEach(item => {
                    const current = map.get(item.menuId);
                    const parentId = normalizeParentId(item.upperMenuId);
                    if (parentId === null || !map.has(parentId)) roots.push(current);
                    else map.get(parentId).children.push(current);
                });
                const compare = (a, b) => {
                    const ao = Number(a.menuOrd ?? 0);
                    const bo = Number(b.menuOrd ?? 0);
                    if (ao !== bo) return ao - bo;
                    return Number(a.menuId) - Number(b.menuId);
                };
                const sortRecursive = list => { list.sort(compare); list.forEach(n => sortRecursive(n.children)); };
                sortRecursive(roots);
                return roots;
            }

            function applyActiveNode() {
                rootEl.querySelectorAll('.menu-node').forEach(n => n.classList.remove('active'));
                if (!activeMenuId) return;
                const li = rootEl.querySelector('li.menu-item[data-menu-id="' + activeMenuId + '"]');
                if (!li) return;
                const node = li.querySelector(':scope > .menu-node');
                if (node) node.classList.add('active');
            }

            function getMenuDepth(menuId) {
                let depth = 1;
                let cur = menuMap.get(Number(menuId));
                let guard = 0;
                while (cur && cur.upperMenuId && cur.upperMenuId !== 'ROOT') {
                    const p = menuMap.get(Number(cur.upperMenuId));
                    if (!p) break;
                    depth += 1;
                    cur = p;
                    guard += 1;
                    if (guard > 1000) break;
                }
                return depth;
            }

            function resolveParentForNew() {
                if (!activeMenuId) return 'ROOT';
                const selected = menuMap.get(Number(activeMenuId));
                if (!selected) return 'ROOT';

                const selectedDepth = getMenuDepth(selected.menuId);
                if (selectedDepth >= MAX_DEPTH) {
                    alert('최대 깊이 3단계를 초과할 수 없습니다. 상위에서 추가하세요.');
                    return selected.upperMenuId && selected.upperMenuId !== '' ? selected.upperMenuId : 'ROOT';
                }
                return String(selected.menuId);
            }

            function setFormModeCreate(preferSelectedParent) {
                formTitle.textContent = '메뉴 등록';
                menuForm.action = '/admin/menus/create';
                formFields.menuId.value = '';
                formFields.langType.value = lang;
                formFields.menuNm.value = '';
                formFields.menuTitle.value = '';
                const parentForNew = preferSelectedParent ? resolveParentForNew() : 'ROOT';
                formFields.upperMenuId.value = parentForNew;
                formFields.menuType.value = 'LINK';
                formFields.url.value = '';
                formFields.menuOrd.value = '';
                formFields.menuDesc.value = '';
                formFields.openYn.checked = true;
                applyActiveNode();
            }

            function setFormModeEdit(menu) {
                activeMenuId = Number(menu.menuId);
                formTitle.textContent = '메뉴 수정';
                menuForm.action = '/admin/menus/' + menu.menuId + '/edit';
                formFields.menuId.value = menu.menuId;
                formFields.langType.value = menu.langType || lang;
                formFields.menuNm.value = menu.menuNm || '';
                formFields.menuTitle.value = menu.menuTitle || '';
                formFields.upperMenuId.value = menu.upperMenuId || 'ROOT';
                formFields.menuType.value = menu.menuType || 'LINK';
                formFields.url.value = menu.url || '';
                formFields.menuOrd.value = menu.menuOrd || '';
                formFields.menuDesc.value = menu.menuDesc || '';
                formFields.openYn.checked = !!menu.openYn;
                applyActiveNode();
            }

            function createNodeEl(menu) {
                const li = document.createElement('li');
                li.className = 'menu-item';
                li.dataset.menuId = String(menu.menuId);
                li.dataset.menuType = menu.menuType || 'LINK';

                const node = document.createElement('div');
                node.className = 'menu-node d-flex justify-content-between align-items-center';

                const left = document.createElement('div');
                const toggle = document.createElement('button');
                toggle.type = 'button';
                toggle.className = 'toggle-children';
                toggle.innerHTML = '<i class="fas fa-chevron-down"></i>';
                left.appendChild(toggle);


                const name = document.createElement('strong');
                name.textContent = menu.menuNm || '(이름 없음)';
                left.appendChild(name);

                const type = document.createElement('span');
                type.className = 'badge badge-info ml-2';
                type.textContent = menu.menuType || 'LINK';
                left.appendChild(type);

                const meta = document.createElement('span');
                meta.className = 'menu-meta ml-2';
                meta.textContent = 'URL: ' + (menu.url || '-');
                left.appendChild(meta);

                node.addEventListener('click', function (e) {
                    if (e.target.closest('.toggle-children') || e.target.closest('form')) return;
                    const selected = menuMap.get(Number(menu.menuId));
                    if (selected) setFormModeEdit(selected);
                });

                const right = document.createElement('div');
                right.className = 'menu-actions';

                const deleteForm = document.createElement('form');
                deleteForm.method = 'post';
                deleteForm.action = '/admin/menus/' + menu.menuId + '/delete';
                const langInput = document.createElement('input');
                langInput.type = 'hidden';
                langInput.name = 'lang';
                langInput.value = lang;
                deleteForm.appendChild(langInput);
                const csrfInput = document.createElement('input');
                csrfInput.type = 'hidden';
                csrfInput.name = csrfParam;
                csrfInput.value = csrfToken;
                deleteForm.appendChild(csrfInput);
                const delBtn = document.createElement('button');
                delBtn.type = 'submit';
                delBtn.className = 'btn btn-danger btn-sm';
                delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                delBtn.onclick = () => confirm('이 메뉴를 삭제하시겠습니까?');
                deleteForm.appendChild(delBtn);
                right.appendChild(deleteForm);

                node.appendChild(left);
                node.appendChild(right);
                li.appendChild(node);
                li.__toggleBtn = toggle;
                return li;
            }

            function renderTree(list, parentEl) {
                list.forEach(menu => {
                    const li = createNodeEl(menu);
                    parentEl.appendChild(li);
                    if (menu.children && menu.children.length > 0) {
                        const childUl = document.createElement('ul');
                        childUl.className = 'menu-children';
                        li.appendChild(childUl);
                        renderTree(menu.children, childUl);
                        li.__toggleBtn.addEventListener('click', function () {
                            const hidden = childUl.style.display === 'none';
                            childUl.style.display = hidden ? '' : 'none';
                            li.__toggleBtn.innerHTML = hidden
                                ? '<i class="fas fa-chevron-down"></i>'
                                : '<i class="fas fa-chevron-right"></i>';
                        });
                    } else {
                        li.__toggleBtn.classList.add('empty');
                    }
                });
            }

            function nodeDepth(li) {
                let depth = 1;
                let parent = li.parentElement;
                while (parent && parent !== rootEl) {
                    const owner = parent.closest('li.menu-item');
                    if (!owner) break;
                    depth += 1;
                    parent = owner.parentElement;
                }
                return depth;
            }

            function subtreeDepth(li) {
                let max = 1;
                const stack = [{el: li, d: 1}];
                while (stack.length > 0) {
                    const cur = stack.pop();
                    max = Math.max(max, cur.d);
                    const children = cur.el.querySelectorAll(':scope > .menu-children > li.menu-item');
                    children.forEach(ch => stack.push({el: ch, d: cur.d + 1}));
                }
                return max;
            }

            function targetParentLi(evt) {
                const toList = evt.to;
                if (!toList || toList === rootEl) return null;
                return toList.closest('li.menu-item');
            }

            function setupSortable(ul) {
                Sortable.create(ul, {
                    group: 'menu-tree',
                    animation: 150,
                    handle: '.menu-node',
                    fallbackOnBody: true,
                    swapThreshold: 0.65,
                    onMove: function (evt) {
                        const draggedLi = evt.dragged;
                        const parentLi = targetParentLi(evt);
                        const newDepth = parentLi ? nodeDepth(parentLi) + 1 : 1;
                        const movedSubDepth = subtreeDepth(draggedLi);
                        return newDepth + movedSubDepth - 1 <= MAX_DEPTH;
                    }
                });
                ul.querySelectorAll(':scope > li > .menu-children').forEach(setupSortable);
            }

            function collectOrders(ul, parentId, out) {
                const items = ul.querySelectorAll(':scope > li.menu-item');
                items.forEach((li, index) => {
                    const menuId = Number(li.dataset.menuId);
                    out.push({menuId: menuId, parentId: parentId, menuOrd: index + 1});
                    const child = li.querySelector(':scope > .menu-children');
                    if (child) collectOrders(child, menuId, out);
                });
            }

            const tree = buildTree(menus || []);
            renderTree(tree, rootEl);
            setupSortable(rootEl);
            applyActiveNode();

            saveBtn.addEventListener('click', async function () {
                const payload = [];
                collectOrders(rootEl, null, payload);
                if (payload.length === 0) return;
                const res = await fetch('/admin/menus/reorder?lang=' + encodeURIComponent(lang), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', [csrfHeader]: csrfToken},
                    body: JSON.stringify(payload)
                });
                if (res.ok) location.reload();
                else {
                    let msg = '정렬 저장 중 오류가 발생했습니다.';
                    try {
                        const body = await res.json();
                        if (body && body.message) msg = body.message;
                    } catch (e) {}
                    alert(msg);
                }
            });

            if (expandAllBtn) expandAllBtn.addEventListener('click', function () {
                rootEl.querySelectorAll('.menu-children').forEach(el => { el.style.display = ''; });
                rootEl.querySelectorAll('.toggle-children:not(.empty)').forEach(btn => btn.innerHTML = '<i class="fas fa-chevron-down"></i>');
            });
            if (collapseAllBtn) collapseAllBtn.addEventListener('click', function () {
                rootEl.querySelectorAll('.menu-children').forEach(el => { el.style.display = 'none'; });
                rootEl.querySelectorAll('.toggle-children:not(.empty)').forEach(btn => btn.innerHTML = '<i class="fas fa-chevron-right"></i>');
            });
            if (createNewBtn) createNewBtn.addEventListener('click', function () { setFormModeCreate(true); });
            if (cancelEditBtn) cancelEditBtn.addEventListener('click', function () { setFormModeCreate(false); });
        })();
    </script>
</th:block>
</body>
</html>
