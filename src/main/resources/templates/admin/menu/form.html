<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title th:text="${menu.menuId != null ? 'Edit Menu' : 'Create Menu'}">Menu</title>
</head>
<body>
    <!-- Page Title -->
    <h1 layout:fragment="page-title" th:text="${menu.menuId != null} ? 'Edit Menu' : 'Create Menu'">Menu Form</h1>

    <!-- Breadcrumb -->
    <ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Home</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/menus}">Menus</a></li>
        <li class="breadcrumb-item active" th:text="${menu.menuId != null ? 'Edit' : 'Create'}">Form</li>
    </ol>

    <!-- Content -->
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title" th:text="${menu.menuId != null ? 'Edit Menu' : 'New Menu'}">Menu Form</h3>
            </div>
            <form th:action="${menu.menuId != null ? '/admin/menus/' + menu.menuId + '/edit' : '/admin/menus/create'}"
                  th:object="${menu}" method="post">
                <div class="card-body">
                    <div class="form-group">
                        <label for="menuNm">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="menuNm" th:field="*{menuNm}"
                               required placeholder="Enter menu name">
                    </div>

                    <div class="form-group">
                        <label for="url">URL</label>
                        <input type="text" class="form-control" id="url" th:field="*{url}"
                               placeholder="Enter URL">
                    </div>

                    <div class="form-group">
                        <label for="langType">Language</label>
                        <select class="form-control" id="langType" th:field="*{langType}">
                            <option value="KR">Korean (KR)</option>
                            <option value="EN">English (EN)</option>
                            <option value="JP">Japanese (JP)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="menuType">Type</label>
                        <select class="form-control" id="menuType" th:field="*{menuType}">
                            <option value="LINK">Link</option>
                            <option value="BOARD">Board</option>
                            <option value="PAGE">Page</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="menuOrd">Order</label>
                        <input type="number" class="form-control" id="menuOrd" step="1" th:field="*{menuOrd}"
                               placeholder="Enter display order">
                    </div>

                    <div class="form-group">
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="openYn" th:field="*{openYn}">
                            <label class="custom-control-label" for="openYn">Open</label>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <a th:href="@{/admin/menus}" class="btn btn-default">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
