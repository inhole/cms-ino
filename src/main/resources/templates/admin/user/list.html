<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>사용자 관리</title>
</head>
<body>
<h1 layout:fragment="page-title" th:text="${(userType == 'admin' ? '관리자' : '사용자') + ' 관리'}">사용자 관리</h1>
<ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">홈</a></li>
    <li class="breadcrumb-item">사용자 관리</li>
    <li class="breadcrumb-item active" th:text="${userType == 'admin' ? '관리자' : '사용자'}">사용자</li>
</ol>

<div layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title" th:text="${(userType == 'admin' ? '관리자' : '사용자') + ' 목록'}">사용자 목록</h3>
            <div class="card-tools">
                <a th:href="@{/admin/users/new(type=${userType})}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 사용자 등록</a>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${message}" class="alert alert-success alert-dismissible">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <i class="icon fas fa-check"></i> <span th:text="${message}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <i class="icon fas fa-ban"></i> <span th:text="${error}"></span>
            </div>

            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>사용자 ID</th>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>전화번호</th>
                    <th>권한</th>
                    <th>상태</th>
                    <th>최근 로그인</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.userId}">admin</td>
                    <td th:text="${user.userName}">관리자</td>
                    <td th:text="${user.userEmail}">admin@example.com</td>
                    <td th:text="${user.phone}">010-0000-0000</td>
                    <td><span class="badge badge-primary" th:text="${user.userLevel}">ADMIN</span></td>
                    <td><span th:class="${user.useYn ? 'badge badge-success' : 'badge badge-danger'}"
                              th:text="${user.useYn ? '사용' : '중지'}">사용</span></td>
                    <td th:text="${user.lastLoginDt != null ? #temporals.format(user.lastLoginDt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id},type=${userType})}" class="btn btn-info btn-sm"><i class="fas fa-edit"></i></a>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id},userType=${userType})}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('이 사용자를 삭제하시겠습니까?')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="9" class="text-center text-muted py-4">등록된 사용자가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
