<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <!-- Page Title -->
    <h1 layout:fragment="page-title">Dashboard</h1>

    <!-- Breadcrumb -->
    <ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">Dashboard</li>
    </ol>

    <!-- Content -->
    <div layout:fragment="content">
        <!-- Info boxes -->
        <div class="row">
            <div class="col-12 col-sm-6 col-md-3">
                <div class="info-box">
                    <span class="info-box-icon bg-info elevation-1"><i class="fas fa-clipboard"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Total Boards</span>
                        <span class="info-box-number">0</span>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
                <div class="info-box mb-3">
                    <span class="info-box-icon bg-danger elevation-1"><i class="fas fa-list"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Total Menus</span>
                        <span class="info-box-number">0</span>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
                <div class="info-box mb-3">
                    <span class="info-box-icon bg-success elevation-1"><i class="fas fa-users"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Total Users</span>
                        <span class="info-box-number">0</span>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
                <div class="info-box mb-3">
                    <span class="info-box-icon bg-warning elevation-1"><i class="fas fa-eye"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Today Visits</span>
                        <span class="info-box-number">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- URI Information Card -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="fas fa-link"></i> Current URI Info
                        </h3>
                    </div>
                    <div class="card-body">
                        <dl class="row">
                            <dt class="col-sm-3">Current URI:</dt>
                            <dd class="col-sm-9"><code th:text="${currentUri}"></code></dd>

                            <dt class="col-sm-3">Context Path:</dt>
                            <dd class="col-sm-9"><code th:text="${contextPath}"></code></dd>

                            <dt class="col-sm-3">URI (without context):</dt>
                            <dd class="col-sm-9"><code th:text="${uri}"></code></dd>

                            <dt class="col-sm-3">Full URL:</dt>
                            <dd class="col-sm-9"><code th:text="${fullUrl}"></code></dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Links -->
        <div class="row">
            <div class="col-md-4">
                <div class="card card-primary card-outline">
                    <div class="card-body box-profile">
                        <div class="text-center">
                            <i class="fas fa-clipboard fa-3x mb-3"></i>
                        </div>
                        <h3 class="profile-username text-center">Board Management</h3>
                        <p class="text-muted text-center">Manage boards.</p>
                        <a th:href="@{/admin/boards}" class="btn btn-primary btn-block">
                            <b>Go</b>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-primary card-outline">
                    <div class="card-body box-profile">
                        <div class="text-center">
                            <i class="fas fa-list fa-3x mb-3"></i>
                        </div>
                        <h3 class="profile-username text-center">Menu Management</h3>
                        <p class="text-muted text-center">Manage menus.</p>
                        <a th:href="@{/admin/menus}" class="btn btn-primary btn-block">
                            <b>Go</b>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-primary card-outline">
                    <div class="card-body box-profile">
                        <div class="text-center">
                            <i class="fas fa-users fa-3x mb-3"></i>
                        </div>
                        <h3 class="profile-username text-center">User Management</h3>
                        <p class="text-muted text-center">Manage users.</p>
                        <a th:href="@{/admin/users/admin}" class="btn btn-primary btn-block">
                            <b>Go</b>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
