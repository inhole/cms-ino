<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>대시보드</title>
</head>
<body>
<h1 layout:fragment="page-title">대시보드</h1>

<ol layout:fragment="breadcrumb" class="breadcrumb float-sm-right">
    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">홈</a></li>
    <li class="breadcrumb-item active">대시보드</li>
</ol>

<div layout:fragment="content">
    <div class="row">
        <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box">
                <span class="info-box-icon bg-info elevation-1"><i class="fas fa-clipboard"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">전체 게시판</span>
                    <span class="info-box-number">0</span>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box mb-3">
                <span class="info-box-icon bg-danger elevation-1"><i class="fas fa-list"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">전체 메뉴</span>
                    <span class="info-box-number">0</span>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box mb-3">
                <span class="info-box-icon bg-success elevation-1"><i class="fas fa-users"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">전체 사용자</span>
                    <span class="info-box-number">0</span>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box mb-3">
                <span class="info-box-icon bg-warning elevation-1"><i class="fas fa-eye"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">오늘 방문자</span>
                    <span class="info-box-number">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-link"></i> 현재 URI 정보</h3>
                </div>
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-sm-3">현재 URI:</dt>
                        <dd class="col-sm-9"><code th:text="${currentUri}"></code></dd>
                        <dt class="col-sm-3">컨텍스트 경로:</dt>
                        <dd class="col-sm-9"><code th:text="${contextPath}"></code></dd>
                        <dt class="col-sm-3">URI (컨텍스트 제외):</dt>
                        <dd class="col-sm-9"><code th:text="${uri}"></code></dd>
                        <dt class="col-sm-3">전체 URL:</dt>
                        <dd class="col-sm-9"><code th:text="${fullUrl}"></code></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card card-primary card-outline">
                <div class="card-body box-profile">
                    <div class="text-center"><i class="fas fa-clipboard fa-3x mb-3"></i></div>
                    <h3 class="profile-username text-center">게시판 관리</h3>
                    <p class="text-muted text-center">게시판을 관리합니다.</p>
                    <a th:href="@{/admin/boards}" class="btn btn-primary btn-block"><b>이동</b></a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-primary card-outline">
                <div class="card-body box-profile">
                    <div class="text-center"><i class="fas fa-list fa-3x mb-3"></i></div>
                    <h3 class="profile-username text-center">메뉴 관리</h3>
                    <p class="text-muted text-center">메뉴를 관리합니다.</p>
                    <a th:href="@{/admin/menus}" class="btn btn-primary btn-block"><b>이동</b></a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-primary card-outline">
                <div class="card-body box-profile">
                    <div class="text-center"><i class="fas fa-users fa-3x mb-3"></i></div>
                    <h3 class="profile-username text-center">사용자 관리</h3>
                    <p class="text-muted text-center">사용자를 관리합니다.</p>
                    <a th:href="@{/admin/users/admin}" class="btn btn-primary btn-block"><b>이동</b></a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
