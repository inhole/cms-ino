spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cms?sessionVariables=group_concat_max_len=1048576&useUnicode=true&serverTimezone=Asia/Seoul&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull
    username: cms
    password: cms1234
    hikari:
      auto-commit: false
      leak-detection-threshold: 30000
      maximum-pool-size: 200
      minimum-idle: 10
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    show-sql: true

logging:
  level:
    org.springframework.security: DEBUG
    cms: DEBUG

